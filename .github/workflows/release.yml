name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version PR or publish to npm
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC): no NPM_TOKEN. Requires npm ≥ 11.5.1 + Node ≥ 22.14
    # and Trusted Publisher configured on npm for this repo + workflow file `release.yml`.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # pnpm publish shells out to the npm CLI; OIDC requires npm ≥ 11.5.1 (npm docs).
      - name: Upgrade global npm for OIDC
        run: npm install -g npm@^11.6.0

      - name: Verify npm (Trusted Publishing)
        run: |
          node <<'NODE'
          const { execSync } = require('node:child_process');
          const ver = execSync('npm --version', { encoding: 'utf8' }).trim();
          const parts = ver.split('.').map((x) => Number(x));
          const [maj, min, pat] = [parts[0] || 0, parts[1] || 0, parts[2] || 0];
          const ok = maj > 11 || (maj === 11 && (min > 5 || (min === 5 && pat >= 1)));
          if (!ok) {
            console.error('npm must be >= 11.5.1 for Trusted Publishing, got:', ver);
            process.exit(1);
          }
          console.log('npm', ver, 'OK for OIDC publish');
          NODE

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm validate && changeset publish
          commit: "chore: release package"
          title: "chore: release package"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
